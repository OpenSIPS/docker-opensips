---
name: Publish OpenSIPS Image
description: Builds and publishes OpenSIPS docker image to Docker Hub and optionally to GitHub Container Registry
inputs:
  version:
    description: OpenSIPS Version to build the image for
    required: false
  tag:
    description: The Docker tag to publish the image
    required: false
  component:
    description: The apt component to pull the OpenSIPS deb from
    required: false
  cli:
    description: Indicates whether to install OpenSIPS CLI as well
    required: false
  modules:
    description: Space-separated additional packages to install
    required: false
  build:
    description: Indicates the build to use
    required: false
  docker-username:
    description: The Docker username to push the image as
    required: true
  docker-token:
    description: The Docker authentication token used
    required: true
  ghcr-token:
    description: GitHub token used to push to ghcr.io (omit to skip GHCR publishing)
    required: false

runs:
  using: "composite"

  steps:
  - uses: actions/checkout@v6
    with:
      repository: OpenSIPS/docker-opensips

  - name: Prepare Environment
    shell: bash
    run: |
      test -n "${{ inputs.version }}" && echo "OPENSIPS_VERSION=${{ inputs.version }}" >> $GITHUB_ENV || true
      test -n "${{ inputs.tag }}" && echo "OPENSIPS_DOCKER_TAG=${{ inputs.tag }}" >> $GITHUB_ENV || true
      test -n "${{ inputs.cli }}" && echo "OPENSIPS_CLI=${{ inputs.cli }}" >> $GITHUB_ENV || true
      test -n "${{ inputs.modules }}" && echo "OPENSIPS_EXTRA_MODULES=${{ inputs.modules }}" >> $GITHUB_ENV || true
      test -n "${{ inputs.build }}" && echo "OPENSIPS_BUILD=\"${{ inputs.build }}\"" >> $GITHUB_ENV || true
      test -n "${{ inputs.component }}" && echo "OPENSIPS_COMPONENT=\"${{ inputs.component }}\"" >> $GITHUB_ENV || true

  - name: Build the Docker image
    shell: bash
    id: build
    run: make build 2>&1 | tee /tmp/build.log && grep "naming to docker.io" /tmp/build.log | awk  -F'[ /]' '{print "DOCKER_TAG=" $5 "/" $6 }' >> $GITHUB_OUTPUT

  - name: Log in to Docker Hub
    uses: docker/login-action@v4
    with:
      username: ${{ inputs.docker-username }}
      password: ${{ inputs.docker-token }}

  - name: Log in to GitHub Container Registry
    if: ${{ inputs.ghcr-token != '' }}
    uses: docker/login-action@v4
    with:
      registry: ghcr.io
      username: ${{ github.repository_owner }}
      password: ${{ inputs.ghcr-token }}

  - name: Publish the Docker image to Docker Hub
    shell: bash
    run: docker push ${{ steps.build.outputs.DOCKER_TAG }}

  - name: Publish the Docker image to GitHub Container Registry
    if: ${{ inputs.ghcr-token != '' }}
    shell: bash
    run: |
      GHCR_TAG="ghcr.io/${{ github.repository_owner }}/opensips:${OPENSIPS_DOCKER_TAG:-latest}"
      docker tag "opensips/opensips:${OPENSIPS_DOCKER_TAG:-latest}" "$GHCR_TAG"
      docker push "$GHCR_TAG"
